<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>desapego do Renato</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#ffffff;--paper:#fff;--ink:#26212b;--muted:#9b94a3;--green:#7a1fa2;--green-d:#5e167f;--coral:#7a1fa2;--coral-d:#5e167f;--yellow:#ffd24c;--mustard:#ffce3a;--line:#ece8f1;--soft:#f6f2f9}
*{box-sizing:border-box}
body{margin:0;font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased}
h1,h2,h3,.display{font-family:'Fredoka',system-ui,sans-serif}
.wrap{max-width:1040px;margin:0 auto;padding:0 18px}
.hdr{position:sticky;top:0;z-index:20;background:#fff;color:var(--ink);border-bottom:1px solid var(--line)}
.hdr-in{display:flex;align-items:center;gap:12px;padding:13px 18px;max-width:1040px;margin:0 auto}
.logo{font-family:'Fredoka';font-weight:700;font-size:24px;color:var(--green);cursor:pointer;display:flex;align-items:center;gap:7px;line-height:1;text-transform:lowercase}
.logo b{color:var(--green);font-weight:700}.logo .dot{width:9px;height:9px;border-radius:50%;background:var(--mustard);display:inline-block}
.hero{padding:26px 0 8px}.hero h1{font-size:30px;margin:0 0 4px;text-transform:lowercase}.hero p{margin:0;color:var(--muted);font-weight:600}
.pill-btn{font-family:'Nunito';font-weight:800;border:none;border-radius:999px;padding:9px 16px;cursor:pointer;font-size:14px;transition:transform .08s,filter .15s}
.pill-btn:active{transform:translateY(1px)}
.btn-coral{background:var(--coral);color:#fff}.btn-coral:hover{filter:brightness(1.04)}
.btn-wa{background:#25D366;color:#0b3d2e}.btn-wa:hover{filter:brightness(1.04)}
.btn-out{background:#fff;color:var(--green);border:2px solid var(--green)}
.btn-block{width:100%;padding:13px;font-size:15px}.btn-lg{padding:12px 20px;font-size:15px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;padding:18px 0 50px}
.card{background:var(--paper);border-radius:14px;overflow:hidden;border:1px solid var(--line);cursor:pointer;transition:transform .12s,box-shadow .15s;display:flex;flex-direction:column}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(122,31,162,.10)}
.card .ph{aspect-ratio:1/1;background:var(--soft);position:relative;overflow:hidden}
.card .ph img{width:100%;height:100%;object-fit:cover;display:block}
.card .ph .empty{display:flex;align-items:center;justify-content:center;height:100%;color:#cfc7b4;font-size:40px}
.badge{position:absolute;top:10px;left:10px;font-family:'Fredoka';font-weight:600;font-size:12px;padding:5px 10px;border-radius:999px;color:#fff;box-shadow:0 2px 6px rgba(0,0,0,.15)}
.b-open{background:var(--green)}.b-sold{background:#fff;color:#d70a2c;border:1.5px solid #d70a2c;font-weight:700}.b-reserved{background:var(--mustard);color:#26212b;border:1.5px solid #e0a800;font-weight:700}
.card .body{padding:12px 13px 14px}
.card .ttl{font-weight:800;font-size:14.5px;line-height:1.3;margin:0 0 7px;min-height:38px;text-transform:lowercase}
.price-from{color:var(--muted);font-size:12.5px;text-decoration:line-through;font-weight:700}
.price-now{font-family:'Fredoka';font-weight:700;color:var(--green);font-size:20px;line-height:1}
.price-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.disc{display:inline-block;background:var(--mustard);color:#3a2b00;font-family:'Fredoka';font-weight:700;font-size:11.5px;padding:3px 9px;border-radius:999px;line-height:1.4}
.valuebox{background:var(--soft);border-radius:14px;padding:12px 14px;margin:6px 0 12px}
.valuebox .real{color:var(--muted);font-weight:800;font-size:13px}
.valuebox .ask{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;margin-top:5px}
.valuebox .ask .v{font-family:'Fredoka';font-weight:700;color:var(--green);font-size:26px;line-height:1}
.valuebox .ask .pct{background:var(--mustard);color:#3a2b00;font-family:'Fredoka';font-weight:700;font-size:12px;padding:3px 9px;border-radius:999px}
.lessnote{color:var(--muted);font-weight:700;font-size:12px;margin:8px 0 0}
.card.is-sold{cursor:default}
.card.is-sold:hover{transform:none;box-shadow:none;border-color:var(--line)}
.card.is-sold .ph img{filter:grayscale(1);opacity:.65}
.card.is-sold .ttl{color:var(--muted);text-decoration:line-through;text-decoration-color:var(--muted)}
.card.is-sold .price-now,.card.is-sold .price-from{text-decoration:line-through;text-decoration-color:var(--muted);color:var(--muted)}
.card.is-sold .disc{background:#ececf0;color:#a8a2b2}
.card.is-reserved{border-color:var(--mustard);box-shadow:0 0 0 1px var(--mustard) inset}
.reserved-note{background:#fff7e0;border:1.5px solid var(--mustard);color:#7a5b00;font-weight:700;border-radius:12px;padding:11px 13px;margin-bottom:12px;font-size:14px;line-height:1.35}
.section-h{font-family:'Fredoka';font-weight:600;font-size:18px;margin:8px 0 0}
.detail{padding:18px 0 60px}
.back{background:none;border:none;color:var(--green);font-weight:800;cursor:pointer;font-size:15px;padding:6px 0;display:inline-flex;gap:6px;align-items:center}
.dcols{display:grid;grid-template-columns:1.1fr 1fr;gap:26px;margin-top:10px}
@media(max-width:760px){.dcols{grid-template-columns:1fr}}
.gallery .main{aspect-ratio:1/1;background:var(--soft);border-radius:22px;overflow:hidden;border:1px solid var(--line)}
.gallery .main img{width:100%;height:100%;object-fit:cover}
.thumbs{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.thumbs button{width:62px;height:62px;border-radius:14px;overflow:hidden;border:2px solid transparent;padding:0;cursor:pointer;background:var(--soft)}
.thumbs button.on{border-color:var(--coral)}.thumbs img{width:100%;height:100%;object-fit:cover}
.dttl{font-size:26px;margin:2px 0 6px;text-transform:lowercase}
.tag{display:inline-flex;align-items:center;gap:8px;background:var(--soft);border-radius:14px;padding:10px 14px;margin:6px 0 2px}
.tag .from{color:var(--muted);text-decoration:line-through;font-weight:800}
.tag .now{font-family:'Fredoka';font-weight:700;color:var(--green);font-size:24px;line-height:1}
.tag .lbl{color:var(--muted);font-weight:700;font-size:12px}
.desc{color:var(--muted);font-weight:700;margin-top:10px}
.refs{margin:16px 0}.refs h4{font-family:'Fredoka';font-weight:600;font-size:14px;margin:0 0 8px}
.ref-link{display:flex;gap:8px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:12px;padding:9px 12px;margin-bottom:7px;text-decoration:none;color:var(--green);font-weight:700;font-size:13.5px;word-break:break-all}
.ref-link:hover{border-color:var(--green)}
.bidbox{background:#fff;border:2px solid var(--line);border-radius:22px;padding:18px;box-shadow:0 8px 22px rgba(19,107,79,.06)}
.bidbox.sold{border-color:#5b6b7a;background:#f3f5f7}
.cur{display:flex;align-items:baseline;gap:8px;margin-bottom:4px}
.cur .v{font-family:'Fredoka';font-weight:700;font-size:30px;color:var(--green)}.cur .l{color:var(--muted);font-weight:800;font-size:12px}
.hint{color:var(--muted);font-weight:700;font-size:13px;margin:2px 0 14px}
.sold-card{text-align:center}.sold-card .em{font-size:38px}
.sold-tag{display:inline-block;margin-top:6px;background:#5b6b7a;color:#fff;font-family:'Fredoka';font-weight:600;padding:6px 14px;border-radius:999px;font-size:14px}
.field{margin-bottom:11px}.field label{display:block;font-weight:800;font-size:12.5px;margin-bottom:5px}
.inp{width:100%;border:2px solid var(--line);border-radius:13px;padding:11px 13px;font-family:'Nunito';font-weight:700;font-size:15px;background:#fff;color:var(--ink);outline:none}
.inp:focus{border-color:var(--green)}.inp.err{border-color:var(--coral)}
.msg{font-weight:800;font-size:13px;margin:6px 0 0}.msg.bad{color:var(--coral-d)}
.modal-bg{position:fixed;inset:0;background:rgba(20,30,25,.45);z-index:50;display:flex;align-items:center;justify-content:center;padding:18px}
.modal{background:#fff;border-radius:22px;padding:24px;max-width:360px;width:100%;position:relative}
.modal .xclose{position:absolute;top:14px;right:14px;width:30px;height:30px;border-radius:50%;border:none;background:var(--soft);color:var(--ink);font-size:15px;font-weight:800;cursor:pointer;line-height:1;display:flex;align-items:center;justify-content:center}
.modal .xclose:hover{background:var(--line)}
.stepper{display:flex;align-items:center;gap:10px}
.stepbtn{width:46px;height:46px;border-radius:50%;border:2px solid var(--line);background:#fff;color:var(--green);font-size:24px;font-weight:800;cursor:pointer;line-height:1;display:flex;align-items:center;justify-content:center;flex:none}
.stepbtn:hover{border-color:var(--green)}.stepbtn:active{transform:translateY(1px)}
.stepinp{text-align:center;font-family:'Fredoka';font-weight:700;font-size:22px;color:var(--green)}
.btn-wa{background:#25D366;color:#0b3d2e;display:inline-flex;align-items:center;justify-content:center;gap:8px}
.modal h3{margin:0 0 6px}.modal .mttl{color:var(--muted);font-weight:700;font-size:14px;margin:0 0 10px;text-transform:lowercase}
.bidchips{display:flex;gap:8px;flex-wrap:wrap;margin:2px 0 10px}
.chip{background:var(--soft);border:1.5px solid var(--line);border-radius:999px;padding:7px 12px;font-family:'Nunito';font-weight:800;font-size:12.5px;color:var(--green);cursor:pointer}
.chip:hover{border-color:var(--green)}
.row-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.foot{text-align:center;color:var(--muted);font-size:12px;font-weight:700;padding:24px 0 34px}
.center-note{text-align:center;color:var(--muted);font-weight:700;padding:40px 0}.center-note .em{font-size:46px;display:block;margin-bottom:8px}
</style>
</head>

const app = document.getElementById('app');
let currentId = null;

function go(name, id){
  if(name==='detail'){ currentId=id; app.innerHTML = detailHTML(ITEMS.find(x=>x.id===id)); }
  else { currentId=null; app.innerHTML = listHTML(); }
  window.scrollTo(0,0);
}

/* ---------- list ---------- */
function cardHTML(it){
  const sold = !!it.sold;
  const reserved = !sold && !!it.reserved;
  const badge = sold ? '<span class="badge b-sold">vendido</span>' : (reserved ? '<span class="badge b-reserved">pré-vendido</span>' : '');
  const img = it.photos && it.photos[0] ? '<img src="'+it.photos[0]+'" alt="'+esc(it.title)+'" onerror="this.onerror=null;this.src=IMG_FALLBACK">' : '<div class="empty">🛋️</div>';
  const from = it.pricePaid>0 ? '<div class="price-from">de '+fmt(it.pricePaid)+'</div>' : '';
  const pct = discPct(it);
  const disc = pct>0 ? '<span class="disc">'+pct+'% OFF</span>' : '';
  const btn = sold ? '' : '<button class="pill-btn btn-coral btn-block" style="margin-top:10px" onclick="event.stopPropagation();openBid(\''+it.id+'\')">dar lance</button>';
  const click = sold ? '' : 'onclick="go(\'detail\',\''+it.id+'\')"';
  return '<div class="card'+(sold?' is-sold':'')+(reserved?' is-reserved':'')+'" '+click+'>'
    + '<div class="ph">'+img+badge+'</div>'
    + '<div class="body"><p class="ttl">'+esc(it.title)+'</p>'+from
    + '<div class="price-row"><div class="price-now">'+fmt(it.askingPrice)+'</div>'+disc+'</div>'+btn+'</div></div>';
}
function listHTML(){
  const avail = ITEMS.filter(i=>!i.sold);
  const sold = ITEMS.filter(i=>i.sold);
  if(!ITEMS.length) return '<div class="center-note"><span class="em">📦</span>nada por aqui ainda.</div>';
  let h = '<div class="hero"><h1>desapega aí 👋</h1><p>coisas boas de casa procurando dono novo. dá teu lance pelo whatsapp.</p></div>';
  h += '<div class="grid">'+avail.map(cardHTML).join('')+'</div>';
  if(sold.length) h += '<h2 class="section-h">já saíram</h2><div class="grid">'+sold.map(cardHTML).join('')+'</div>';
  return h;
}

/* ---------- detail ---------- */
function detailHTML(it){
  if(!it) return '<div class="detail"><button class="back" onclick="go(\'list\')">← voltar</button><div class="center-note">item não encontrado.</div></div>';
  const photos = it.photos || [];
  const main = photos[0] ? '<img id="mainimg" src="'+photos[0]+'" alt="'+esc(it.title)+'" onerror="this.onerror=null;this.src=IMG_FALLBACK">' : '<div class="empty">🛋️</div>';
  const thumbs = photos.length>1 ? '<div class="thumbs">'+photos.map((p,i)=>'<button class="'+(i===0?'on':'')+'" onclick="setMain('+i+',this)"><img src="'+p+'" alt="foto '+(i+1)+'" onerror="this.onerror=null;this.src=IMG_FALLBACK"></button>').join('')+'</div>' : '';
  const from = it.pricePaid>0 ? '<span class="from">'+fmt(it.pricePaid)+'</span>' : '';
  const desc = it.description ? '<p class="desc">'+esc(it.description)+'</p>' : '';
  const refs = (it.refs&&it.refs.length) ? '<div class="refs"><h4>achei parecido por aí</h4>'+it.refs.map(r=>'<a class="ref-link" href="'+esc(r)+'" target="_blank" rel="noreferrer">🔗 '+esc(r)+'</a>').join('')+'</div>' : '';
  let box;
  if(it.sold){
    box = '<div class="bidbox sold"><div class="sold-card"><span class="em">✅</span><h3 style="margin:4px 0">já vendido</h3><p style="color:var(--muted);font-weight:800;margin:0">esta peça já encontrou dono novo.</p><div class="sold-tag">indisponível</div></div></div>';
  } else {
    const pct = discPct(it);
    const resv = it.reserved ? '<div class="reserved-note">🔖 <b>pré-vendido</b> — uma pessoa marcou de ver pessoalmente. pode dar teu lance assim mesmo: se não rolar, te chamo na ordem.</div>' : '';
    box = resv + '<div class="bidbox">'
      + '<div class="valuebox">'
      + (it.pricePaid>0 ? '<div class="real">valor real do produto: <s>'+fmt(it.pricePaid)+'</s></div>' : '')
      + '<div class="ask"><span class="v">'+fmt(it.askingPrice)+'</span>'+(pct>0?'<span class="pct">'+pct+'% OFF</span>':'')+'</div></div>'
      + (pct>0 ? '<p class="hint">esse já é o preço com '+pct+'% de desconto sobre o valor real.</p>' : '')
      + '<button class="pill-btn btn-coral btn-block" onclick="openBid(\''+it.id+'\')">dar lance</button></div>';
  }
  return '<div class="detail"><button class="back" onclick="go(\'list\')">← voltar</button>'
    + '<div class="dcols"><div class="gallery"><div class="main">'+main+'</div>'+thumbs+'</div>'
    + '<div><h1 class="dttl">'+esc(it.title)+'</h1>'
    + '<div class="tag">'+from+'<span class="now">'+fmt(it.askingPrice)+'</span><span class="lbl">valor pedido</span></div>'
    + desc + refs + box + '</div></div></div>';
}
function setMain(i, el){
  const it = ITEMS.find(x=>x.id===currentId); if(!it) return;
  document.getElementById('mainimg').src = it.photos[i];
  document.querySelectorAll('.thumbs button').forEach(b=>b.classList.remove('on'));
  if(el) el.classList.add('on');
}

/* ---------- bid modal -> WhatsApp ---------- */
function openBid(id){
  const it = ITEMS.find(x=>x.id===id); if(!it) return;
  const floor = floorOf(it);
  const pct = discPct(it);
  const maxCents = Math.round(it.askingPrice*100);
  const STEP = 10000; // R$ 100,00
  let cents = maxCents;
  const fmtCents = c => (c/100).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
  const ov = document.createElement('div'); ov.className='modal-bg';
  ov.innerHTML =
    '<div class="modal">'
    + '<button class="xclose" id="bidx" aria-label="fechar">✕</button>'
    + '<h3>dar um lance</h3>'
    + '<p class="mttl">'+esc(it.title)+'</p>'
    + '<div class="valuebox">'
    + (it.pricePaid>0 ? '<div class="real">valor real do produto: <s>'+fmt(it.pricePaid)+'</s></div>' : '')
    + '<div class="ask"><span class="v">'+fmt(it.askingPrice)+'</span>'+(pct>0?'<span class="pct">'+pct+'% OFF</span>':'')+'</div></div>'
    + (pct>0 ? '<p class="hint">o produto vale '+fmt(it.pricePaid)+'. já estou pedindo '+fmt(it.askingPrice)+' — um desconto de '+pct+'%.</p>' : '')
    + '<div class="field"><label>seu lance</label>'
    + '<div class="stepper"><button type="button" class="stepbtn" id="bidminus" aria-label="menos cem reais">−</button>'
    + '<input id="bidinp" class="inp stepinp" type="text" inputmode="numeric" value="'+fmtCents(cents)+'">'
    + '<button type="button" class="stepbtn" id="bidplus" aria-label="mais cem reais">+</button></div></div>'
    + '<p class="lessnote">se quiser, é só usar o − pra oferecer um pouco menos.</p>'
    + '<p class="msg bad" id="biderr" style="display:none"></p>'
    + '<div class="row-actions"><button class="pill-btn btn-wa btn-lg btn-block" id="bidsend">'+WA_ICON+'<span>enviar lance no whatsapp</span></button></div>'
    + '</div>';
  const close = ()=>{ if(ov.parentNode) document.body.removeChild(ov); };
  ov.addEventListener('click', e=>{ if(e.target===ov) close(); });
  document.body.appendChild(ov);
  const inp = ov.querySelector('#bidinp'); const err = ov.querySelector('#biderr');
  const clearErr = ()=>{ err.style.display='none'; inp.classList.remove('err'); };
  const renderVal = ()=>{ inp.value = fmtCents(cents); };
  ov.querySelector('#bidx').onclick = close;
  ov.querySelector('#bidminus').onclick = ()=>{ cents = Math.max(0, cents-STEP); renderVal(); clearErr(); };
  ov.querySelector('#bidplus').onclick = ()=>{ cents = Math.min(maxCents, cents+STEP); renderVal(); clearErr(); };
  inp.addEventListener('input', ()=>{ cents = parseInt(inp.value.replace(/\D/g,'')||'0',10); renderVal(); clearErr(); });
  const send = ()=>{
    const a = round2(cents/100);
    const fail = m=>{ err.textContent=m; err.style.display='block'; inp.classList.add('err'); };
    if(!a||a<=0) return fail('informe o valor do seu lance.');
    if(a>it.askingPrice+0.001) return fail('o valor que peço é '+fmt(it.askingPrice)+', não precisa oferecer mais 🙂');
    if(a<floor-0.001) return fail('esse valor ficou bem abaixo do pedido. que tal chegar um pouco mais perto? 🙂');
    const msg = 'Oi '+OWNER.name+'! Tenho interesse no item "'+it.title+'" do seu desapego.\n'
      + 'Valor pedido: '+fmt(it.askingPrice)+'\nMeu lance: '+fmt(a)+'\nPodemos fechar?';
    window.open(waLink(msg),'_blank');
    close();
  };
  ov.querySelector('#bidsend').onclick = send;
  inp.addEventListener('keydown', e=>{ if(e.key==='Enter') send(); });
}

go('list');
</script>
</body>
</html>
